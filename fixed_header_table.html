<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>高级表格 Demo</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
  }

  .toolbar {
    padding: 10px;
    background: #fafafa;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid #ddd;
  }

  .table-container {
    width: 100%;
    height: calc(100vh - 50px);
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    border-collapse: collapse;
    width: max-content;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 10px;
    min-width: 100px;
    text-align: center;
    background: #fff;
  }

  /* 固定表头 */
  thead th {
    position: sticky;
    top: 0;
    background: #f5f5f5;
    z-index: 3;
    cursor: pointer;
  }

  /* 冻结前2列 */
  .freeze-0 {
    position: sticky;
    left: 0;
    background: #f5f5f5;
    z-index: 4;
  }

  .freeze-1 {
    position: sticky;
    left: 100px;
    background: #f5f5f5;
    z-index: 4;
  }

  /* 左上角 */
  thead .freeze-0,
  thead .freeze-1 {
    z-index: 5;
  }

  /* 行高亮 */
  tr.active td {
    background: #d0ebff !important;
  }
</style>
</head>

<body>

<div class="toolbar">
  🔍 筛选：
  <input id="filterInput" placeholder="输入关键词..." />
</div>

<div class="table-container">
  <table id="table"></table>
</div>

<script>
  // =====================
  // 配置区（你只改这里）
  // =====================

  const freezeColumns = 2; // 冻结列数

  const headers = ["名称", "分类", "列1", "列2", "列3", "列4", "列5", "列6", "列7", "列8"];

  const rawData = Array.from({ length: 30 }, (_, i) => {
    return [
      "行" + (i + 1),
      i % 2 === 0 ? "A类" : "B类",
      ...Array.from({ length: 8 }, (_, j) => Math.floor(Math.random() * 100))
    ];
  });

  // =====================
  // 状态
  // =====================
  let currentData = [...rawData];
  let sortState = { col: null, asc: true };

  const table = document.getElementById("table");

  // =====================
  // 渲染
  // =====================
  function render(data) {
    table.innerHTML = "";

    // ===== 表头 =====
    const thead = document.createElement("thead");
    const tr = document.createElement("tr");

    headers.forEach((text, colIndex) => {
      const th = document.createElement("th");
      th.innerText = text;

      if (colIndex < freezeColumns) {
        th.classList.add(`freeze-${colIndex}`);
      }

      // 排序
      th.onclick = () => sort(colIndex);

      tr.appendChild(th);
    });

    thead.appendChild(tr);
    table.appendChild(thead);

    // ===== 表体 =====
    const tbody = document.createElement("tbody");

    data.forEach((row, rowIndex) => {
      const tr = document.createElement("tr");

      // 行点击高亮
      tr.onclick = () => {
        document.querySelectorAll("tr").forEach(r => r.classList.remove("active"));
        tr.classList.add("active");
      };

      row.forEach((cell, colIndex) => {
        const td = document.createElement("td");
        td.innerText = cell;

        if (colIndex < freezeColumns) {
          td.classList.add(`freeze-${colIndex}`);
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
  }

  // =====================
  // 排序
  // =====================
  function sort(colIndex) {
    if (sortState.col === colIndex) {
      sortState.asc = !sortState.asc;
    } else {
      sortState.col = colIndex;
      sortState.asc = true;
    }

    currentData.sort((a, b) => {
      if (a[colIndex] > b[colIndex]) return sortState.asc ? 1 : -1;
      if (a[colIndex] < b[colIndex]) return sortState.asc ? -1 : 1;
      return 0;
    });

    render(currentData);
  }

  // =====================
  // 筛选
  // =====================
  document.getElementById("filterInput").addEventListener("input", (e) => {
    const keyword = e.target.value.toLowerCase();

    currentData = rawData.filter(row =>
      row.some(cell => String(cell).toLowerCase().includes(keyword))
    );

    render(currentData);
  });

  // =====================
  // 初始化
  // =====================
  render(currentData);
</script>

</body>
</html>
