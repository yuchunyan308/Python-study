<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --ink: #1a1410;
      --ink-muted: #6b5e52;
      --accent: #d4380d;
      --accent-light: #fff1ed;
      --border: #d4c9b8;
      --card: #fffdf8;
      --low: #52735a;
      --low-bg: #eef5f0;
      --med: #8c6d2f;
      --med-bg: #fdf6e3;
      --high: #d4380d;
      --high-bg: #fff1ed;
      --done-opacity: 0.45;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      border-bottom: 2px solid var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: stretch;
      background: var(--card);
    }
    .logo-block {
      padding: 1.2rem 2rem 1.2rem 0;
      border-right: 1.5px solid var(--border);
      margin-right: 2rem;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9rem;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
    }
    .logo span { color: var(--accent); }
    .tagline {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--ink-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .header-stats {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex: 1;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
    }
    .stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      line-height: 1;
      color: var(--ink);
    }
    .stat-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .stat-divider {
      width: 1px;
      height: 40px;
      background: var(--border);
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* ── SIDEBAR / FORM ──────────────────────────────────── */
    .sidebar {
      position: sticky;
      top: 2rem;
    }
    .panel {
      background: var(--card);
      border: 1.5px solid var(--ink);
      border-radius: 2px;
    }
    .panel-header {
      border-bottom: 1.5px solid var(--ink);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .panel-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 500;
      color: var(--ink-muted);
    }
    .panel-body { padding: 1.25rem; }

    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      margin-bottom: 5px;
    }
    input[type="text"], textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      padding: 0.55rem 0.75rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: var(--ink);
    }
    textarea { resize: vertical; min-height: 80px; }
    select { cursor: pointer; }

    .priority-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .priority-btn {
      padding: 0.45rem;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      background: transparent;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .priority-btn[data-val="low"] { color: var(--low); }
    .priority-btn[data-val="medium"] { color: var(--med); }
    .priority-btn[data-val="high"] { color: var(--high); }
    .priority-btn.active[data-val="low"] { background: var(--low-bg); border-color: var(--low); }
    .priority-btn.active[data-val="medium"] { background: var(--med-bg); border-color: var(--med); }
    .priority-btn.active[data-val="high"] { background: var(--high-bg); border-color: var(--high); }

    .btn-submit {
      width: 100%;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 2px;
      padding: 0.7rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { background: var(--accent); }
    .btn-submit:active { transform: scale(0.98); }

    /* ── FILTER BAR ──────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 0.3rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      background: var(--card);
      color: var(--ink-muted);
      transition: all 0.15s;
    }
    .filter-chip.active {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    /* ── TASK LIST ───────────────────────────────────────── */
    .section-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }
    .section-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-muted);
      font-weight: 400;
    }

    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 20px 1fr auto;
      gap: 0.75rem;
      align-items: start;
      transition: border-color 0.15s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-card:hover { border-color: var(--ink-muted); }
    .task-card.done { opacity: var(--done-opacity); }
    .task-card.done .task-title { text-decoration: line-through; }

    .task-checkbox {
      width: 18px; height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
      transition: all 0.15s;
      flex-shrink: 0;
      background: transparent;
    }
    .task-checkbox:hover { border-color: var(--ink); }
    .task-checkbox.checked {
      background: var(--ink);
      border-color: var(--ink);
    }
    .task-checkbox.checked::after {
      content: '';
      width: 5px; height: 9px;
      border: 1.5px solid var(--bg);
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px,-1px);
      display: block;
    }

    .task-body {}
    .task-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.4;
    }
    .task-desc {
      font-size: 0.82rem;
      color: var(--ink-muted);
      margin-top: 3px;
      line-height: 1.5;
    }
    .task-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 6px;
    }
    .priority-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 2px;
    }
    .priority-badge.low  { color: var(--low);  background: var(--low-bg); }
    .priority-badge.medium { color: var(--med); background: var(--med-bg); }
    .priority-badge.high { color: var(--high); background: var(--high-bg); }
    .task-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--ink-muted);
    }

    .task-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .icon-btn {
      width: 28px; height: 28px;
      border: 1.5px solid transparent;
      border-radius: 2px;
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-muted);
      transition: all 0.15s;
      font-size: 0.9rem;
    }
    .icon-btn:hover { border-color: var(--border); color: var(--ink); }
    .icon-btn.del:hover { border-color: var(--accent); color: var(--accent); }

    /* ── EMPTY STATE ─────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ink-muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      font-style: italic;
    }

    /* ── TOAST ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: var(--ink);
      color: var(--bg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      padding: 0.65rem 1.1rem;
      border-radius: 2px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── EDIT MODAL ──────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,20,16,0.55);
      display: none;
      align-items: center; justify-content: center;
      z-index: 50;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 2px solid var(--ink);
      border-radius: 2px;
      width: 440px;
      max-width: 95vw;
    }
    .modal-head {
      padding: 1rem 1.25rem;
      border-bottom: 1.5px solid var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-head-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-muted);
    }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--ink-muted); font-size: 1.1rem; line-height: 1;
    }
    .modal-body { padding: 1.25rem; }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      header { flex-direction: column; padding: 1rem; gap: 1rem; }
      .logo-block { border-right: none; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
      .header-stats { flex-wrap: wrap; gap: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo">Task<span>Flow</span></div>
    <div class="tagline">任务管理系统 · v1.0</div>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <span class="stat-num" id="s-total">—</span>
      <span class="stat-label">全部任务</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num" id="s-pending">—</span>
      <span class="stat-label">待完成</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num" id="s-done">—</span>
      <span class="stat-label">已完成</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num" id="s-high">—</span>
      <span class="stat-label">高优先级</span>
    </div>
  </div>
</header>

<div class="container">
  <!-- ── 左栏：新建表单 ── -->
  <aside class="sidebar">
    <div class="panel">
      <div class="panel-header">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <rect x="0.75" y="0.75" width="10.5" height="10.5" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 4v4M4 6h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="panel-title">新建任务</span>
      </div>
      <div class="panel-body">
        <div class="form-group">
          <label class="form-label">任务标题 *</label>
          <input type="text" id="f-title" placeholder="输入任务名称…" />
        </div>
        <div class="form-group">
          <label class="form-label">描述（可选）</label>
          <textarea id="f-desc" placeholder="添加详细说明…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">优先级</label>
          <div class="priority-grid">
            <button class="priority-btn" data-val="low">低</button>
            <button class="priority-btn active" data-val="medium">中</button>
            <button class="priority-btn" data-val="high">高</button>
          </div>
        </div>
        <button class="btn-submit" id="btn-add">＋ 添加任务</button>
      </div>
    </div>
  </aside>

  <!-- ── 右栏：任务列表 ── -->
  <main>
    <div class="filter-bar">
      <button class="filter-chip active" data-filter="all">全部</button>
      <button class="filter-chip" data-filter="pending">待完成</button>
      <button class="filter-chip" data-filter="done">已完成</button>
      <button class="filter-chip" data-filter="high">高优先级</button>
      <button class="filter-chip" data-filter="medium">中优先级</button>
      <button class="filter-chip" data-filter="low">低优先级</button>
    </div>

    <div class="section-heading">
      任务列表
      <span class="section-count" id="list-count"></span>
    </div>
    <div class="task-list" id="task-list"></div>
  </main>
</div>

<!-- ── 编辑弹窗 ── -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-head-title">编辑任务</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id" />
      <div class="form-group">
        <label class="form-label">任务标题 *</label>
        <input type="text" id="edit-title" />
      </div>
      <div class="form-group">
        <label class="form-label">描述</label>
        <textarea id="edit-desc"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">优先级</label>
        <div class="priority-grid" id="edit-priority-grid">
          <button class="priority-btn" data-val="low">低</button>
          <button class="priority-btn active" data-val="medium">中</button>
          <button class="priority-btn" data-val="high">高</button>
        </div>
      </div>
      <button class="btn-submit" id="btn-save">保存更改</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ─────────────────────────────────────────────────────
let selectedPriority = 'medium';
let editPriority = 'medium';
let currentFilter = 'all';

// ── UTILS ─────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const api = async (url, opts = {}) => {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (res.status === 204) return null;
  if (!res.ok) throw new Error(await res.text());
  return res.json();
};

function toast(msg, err = false) {
  const el = $('toast');
  el.textContent = msg;
  el.style.background = err ? '#8b1a1a' : 'var(--ink)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

const priorityLabel = { low: '低', medium: '中', high: '高' };

// ── PRIORITY BUTTONS ──────────────────────────────────────────
function setupPriorityBtns(gridId, onChange) {
  document.querySelectorAll(`#${gridId} .priority-btn`).forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll(`#${gridId} .priority-btn`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onChange(btn.dataset.val);
    });
  });
}

setupPriorityBtns('form-wrapper', v => selectedPriority = v); // placeholder; real setup below

// Manual for create form (outside grid IDs)
document.querySelectorAll('.panel-body .priority-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.panel-body .priority-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPriority = btn.dataset.val;
  });
});

document.querySelectorAll('#edit-priority-grid .priority-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#edit-priority-grid .priority-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    editPriority = btn.dataset.val;
  });
});

// ── RENDER ────────────────────────────────────────────────────
function renderTasks(tasks) {
  const list = $('task-list');
  $('list-count').textContent = `${tasks.length} 条`;

  if (!tasks.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-text">暂无任务，添加第一个吧</div>
      </div>`;
    return;
  }

  list.innerHTML = tasks.map(t => `
    <div class="task-card ${t.completed ? 'done' : ''}" data-id="${t.id}">
      <div class="task-checkbox ${t.completed ? 'checked' : ''}" data-id="${t.id}" title="切换完成状态"></div>
      <div class="task-body">
        <div class="task-title">${escHtml(t.title)}</div>
        ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
        <div class="task-meta">
          <span class="priority-badge ${t.priority}">${priorityLabel[t.priority]}</span>
          <span class="task-date">${fmtDate(t.created_at)}</span>
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn edit-btn" data-id="${t.id}" title="编辑">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M9.5 1.5l2 2-7 7H2.5v-2l7-7z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn del del-btn" data-id="${t.id}" title="删除">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M5 3V2h2v1M4 3v6h4V3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  `).join('');

  // bind events
  list.querySelectorAll('.task-checkbox').forEach(el =>
    el.addEventListener('click', () => toggleTask(+el.dataset.id)));
  list.querySelectorAll('.edit-btn').forEach(el =>
    el.addEventListener('click', () => openEdit(+el.dataset.id)));
  list.querySelectorAll('.del-btn').forEach(el =>
    el.addEventListener('click', () => deleteTask(+el.dataset.id)));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadTasks() {
  let url = '/api/tasks/';
  const params = new URLSearchParams();
  if (currentFilter === 'pending')  params.set('completed', 'false');
  if (currentFilter === 'done')     params.set('completed', 'true');
  if (['high','medium','low'].includes(currentFilter)) params.set('priority', currentFilter);
  if (params.toString()) url += '?' + params.toString();
  const tasks = await api(url);
  renderTasks(tasks);
}

async function loadStats() {
  const s = await api('/api/tasks/stats');
  $('s-total').textContent   = s.total;
  $('s-pending').textContent = s.pending;
  $('s-done').textContent    = s.completed;
  $('s-high').textContent    = s.high_priority;
}

function refresh() { loadTasks(); loadStats(); }

// ── ADD TASK ─────────────────────────────────────────────────
$('btn-add').addEventListener('click', async () => {
  const title = $('f-title').value.trim();
  if (!title) { toast('请输入任务标题', true); return; }
  try {
    await api('/api/tasks/', {
      method: 'POST',
      body: JSON.stringify({ title, description: $('f-desc').value.trim() || null, priority: selectedPriority }),
    });
    $('f-title').value = '';
    $('f-desc').value = '';
    toast('任务已添加 ✓');
    refresh();
  } catch (e) { toast('添加失败', true); }
});

$('f-title').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-add').click(); });

// ── TOGGLE ───────────────────────────────────────────────────
async function toggleTask(id) {
  const card = document.querySelector(`.task-card[data-id="${id}"]`);
  const completed = !card.classList.contains('done');
  try {
    await api(`/api/tasks/${id}`, { method: 'PATCH', body: JSON.stringify({ completed }) });
    refresh();
  } catch { toast('操作失败', true); }
}

// ── DELETE ────────────────────────────────────────────────────
async function deleteTask(id) {
  try {
    await api(`/api/tasks/${id}`, { method: 'DELETE' });
    toast('任务已删除');
    refresh();
  } catch { toast('删除失败', true); }
}

// ── EDIT MODAL ────────────────────────────────────────────────
let editingTask = null;

async function openEdit(id) {
  editingTask = await api(`/api/tasks/${id}`);
  $('edit-id').value = id;
  $('edit-title').value = editingTask.title;
  $('edit-desc').value = editingTask.description || '';
  editPriority = editingTask.priority;
  document.querySelectorAll('#edit-priority-grid .priority-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === editPriority);
  });
  $('modal').classList.add('open');
}

$('modal-close').addEventListener('click', () => $('modal').classList.remove('open'));
$('modal').addEventListener('click', e => { if (e.target === $('modal')) $('modal').classList.remove('open'); });

$('btn-save').addEventListener('click', async () => {
  const title = $('edit-title').value.trim();
  if (!title) { toast('标题不能为空', true); return; }
  try {
    await api(`/api/tasks/${$('edit-id').value}`, {
      method: 'PATCH',
      body: JSON.stringify({ title, description: $('edit-desc').value.trim() || null, priority: editPriority }),
    });
    $('modal').classList.remove('open');
    toast('已保存 ✓');
    refresh();
  } catch { toast('保存失败', true); }
});

// ── FILTER ───────────────────────────────────────────────────
document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    loadTasks();
  });
});

// ── INIT ─────────────────────────────────────────────────────
refresh();
</script>
</body>
</html>
